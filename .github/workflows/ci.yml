name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-e-teste:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura .NET (versao do global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # cacheia ~/.nuget/packages indexado pelos csproj para nao baixar tudo a cada run
      - name: Cache de pacotes NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restaura dependencias
        run: dotnet restore

      - name: Compila em Release
        run: dotnet build --configuration Release --no-restore

      # XPlat Code Coverage e o coletor do Coverlet (Coverlet.Collector ja esta no csproj).
      # Gera coverage.cobertura.xml em TestResults/<guid>/
      - name: Roda os testes unitarios com cobertura
        run: dotnet test tests/CreditoFiscal.Testes/CreditoFiscal.Testes.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Instala ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Converte cobertura para HTML
        run: reportgenerator -reports:'./TestResults/**/coverage.cobertura.xml' -targetdir:'./TestResults/CoverageReport' -reporttypes:'HtmlInline;TextSummary'

      - name: Imprime o resumo de cobertura no log
        run: cat ./TestResults/CoverageReport/Summary.txt

      - name: Publica relatorio HTML como artefato
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-html
          path: ./TestResults/CoverageReport
          retention-days: 30

  integracao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura .NET (versao do global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache de pacotes NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # o runner ubuntu-latest ja tem Docker: o Testcontainers sobe Postgres e RabbitMQ reais
      - name: Roda os testes de integracao
        run: dotnet test tests/CreditoFiscal.TestesIntegracao/CreditoFiscal.TestesIntegracao.csproj --configuration Release --verbosity normal
