# Padrao (RabbitMQ):   docker compose up --build
# Com Kafka:           MENSAGERIA_PROVEDOR=Kafka docker compose --profile kafka up --build
# Com ServiceBus:      MENSAGERIA_PROVEDOR=ServiceBus docker compose --profile servicebus up --build
services:
  postgres:
    image: postgres:15-alpine
    container_name: credito-fiscal-postgres
    environment:
      POSTGRES_DB: creditofiscal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creditofiscal"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: credito-fiscal-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credito-fiscal-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=creditofiscal;Username=postgres;Password=postgres"
      # provedor selecionavel; o broker correspondente sobe via profile
      Mensageria__Provedor: "${MENSAGERIA_PROVEDOR:-RabbitMQ}"
      Mensageria__Fila: "integrar-credito-constituido-entry"
      Mensageria__RabbitMQ__Host: "rabbitmq"
      Mensageria__RabbitMQ__Port: "5672"
      Mensageria__RabbitMQ__Usuario: "guest"
      Mensageria__RabbitMQ__Senha: "guest"
      Mensageria__Kafka__BootstrapServers: "kafka:9092"
      Mensageria__Kafka__GrupoConsumidor: "credito-fiscal"
      Mensageria__ServiceBus__ConnectionString: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=dGVzdGtleQ==;UseDevelopmentEmulator=true"
    # so o Postgres e barreira dura (migrations no startup). O broker e resolvido com retry.
    depends_on:
      postgres:
        condition: service_healthy

  # --- broker opcional: Kafka (profile kafka) ---
  kafka:
    image: bitnami/kafka:3.7
    container_name: credito-fiscal-kafka
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    profiles: ["kafka"]

  # --- broker opcional: Azure ServiceBus emulator + SQL de apoio (profile servicebus) ---
  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: credito-fiscal-servicebus
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: "mssql"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Strong!Passw0rd}"
    volumes:
      - ./servicebus-emulator-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    depends_on:
      - mssql
    profiles: ["servicebus"]

  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: credito-fiscal-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Strong!Passw0rd}"
    profiles: ["servicebus"]

volumes:
  postgres-data:
