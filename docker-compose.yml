services:
  postgres:
    image: postgres:15-alpine
    container_name: credito-fiscal-postgres
    environment:
      POSTGRES_DB: creditofiscal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creditofiscal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # imagem oficial Apache (KRaft)
  kafka:
    image: apache/kafka:3.9.0
    container_name: credito-fiscal-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credito-fiscal-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=creditofiscal;Username=postgres;Password=postgres"
      Mensageria__Provedor: "${MENSAGERIA_PROVEDOR:-Kafka}"
      Mensageria__Fila: "integrar-credito-constituido-entry"
      Mensageria__Kafka__BootstrapServers: "kafka:9092"
      Mensageria__Kafka__GrupoConsumidor: "credito-fiscal"
      Mensageria__RabbitMQ__Host: "rabbitmq"
      Mensageria__RabbitMQ__Port: "5672"
      Mensageria__RabbitMQ__Usuario: "guest"
      Mensageria__RabbitMQ__Senha: "guest"
      Mensageria__ServiceBus__ConnectionString: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=dGVzdGtleQ==;UseDevelopmentEmulator=true"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # --- broker opcional: RabbitMQ (profile rabbitmq) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: credito-fiscal-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["rabbitmq"]

  # --- broker opcional: Azure ServiceBus emulator + SQL de apoio (profile servicebus) ---
  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: credito-fiscal-servicebus
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: "mssql"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Strong!Passw0rd}"
    volumes:
      - ./servicebus-emulator-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    depends_on:
      - mssql
    profiles: ["servicebus"]

  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: credito-fiscal-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Strong!Passw0rd}"
    profiles: ["servicebus"]

volumes:
  postgres-data:
