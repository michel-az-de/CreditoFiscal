services:
  postgres:
    image: postgres:15-alpine
    container_name: credito-fiscal-postgres
    environment:
      POSTGRES_DB: creditofiscal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creditofiscal"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: credito-fiscal-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credito-fiscal-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=creditofiscal;Username=postgres;Password=postgres"
      Mensageria__Provedor: "RabbitMQ"
      Mensageria__Host: "rabbitmq"
      Mensageria__Port: "5672"
      Mensageria__Usuario: "guest"
      Mensageria__Senha: "guest"
      Mensageria__Fila: "integrar-credito-constituido-entry"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
